<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>

<body class="container mt-5">

<h2>翻译平台登录</h2>

<hr>

<div class="mb-3">

    <label>用户名</label>

    <input id="username"
           class="form-control">

</div>

<div class="mb-3">

    <label>密码</label>

    <input type="password"
           id="password"
           class="form-control">

</div>

<button
        onclick="login()"
        class="btn btn-primary">

    登录

</button>

<script>

    function login(){

        let username =
        document.getElementById("username").value;

        let password =
        document.getElementById("password").value;

        fetch(
        "/login?username="
        +username+
        "&password="
        +password
        )

        .then(response=>response.json())

        .then(data=>{

            localStorage.setItem(
                "user",
                JSON.stringify(data)
            );

            alert("登录成功");

            location.href="/";
        })

        .catch(()=>{

            alert("用户名或密码错误");
        });
    }

</script>

</body>
</html>
