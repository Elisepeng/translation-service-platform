<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>发布订单</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-4">

<h2>发布翻译订单</h2>

<hr>

<div class="mb-3">
    <label>标题</label>
    <input id="title" class="form-control">
</div>

<div class="mb-3">
    <label>内容</label>
    <textarea id="content"
              class="form-control"></textarea>
</div>

<div class="mb-3">
    <label>源语言</label>
    <input id="sourceLanguage"
           class="form-control">
</div>

<div class="mb-3">
    <label>目标语言</label>
    <input id="targetLanguage"
           class="form-control">
</div>

<div class="mb-3">
    <label>价格</label>
    <input id="price"
           class="form-control">
</div>

<button class="btn btn-primary"
        onclick="submitOrder()">
    提交订单
</button>

<script>

    function submitOrder(){

        let order = {

            title:
            document.getElementById("title").value,

            content:
            document.getElementById("content").value,

            sourceLanguage:
            document.getElementById("sourceLanguage").value,

            targetLanguage:
            document.getElementById("targetLanguage").value,

            price:
            document.getElementById("price").value
        };

        fetch("/translationOrder/create",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(order)

        })
        .then(response=>response.text())
        .then(data=>{

            alert(data);

            location.href="/";
        });
    }

</script>

</body>
</html>
