<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>翻译服务平台</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-4">

<h2>翻译服务平台</h2>

<button
        class="btn btn-danger btn-sm"
        onclick="logout()">

    退出登录

</button>
<div id="loginUser"></div>

<hr>

<hr>

<h4>系统统计</h4>
<hr>

<input id="keyword"
       class="form-control"
       placeholder="输入订单标题搜索">

<br>

<button class="btn btn-info"
        onclick="searchOrder()">

    搜索订单

</button>

<br><br>

<div id="dashboard"></div>

<hr>

<div id="menu"></div>
<br><br>

<table class="table table-bordered">

    <thead>
    <tr>
        <th>ID</th>
        <th>标题</th>
        <th>源语言</th>
        <th>目标语言</th>
        <th>价格</th>
        <th>创建时间</th>
        <th>状态</th>
        <th>操作</th>
    </tr>
    </thead>

    <tbody id="result">

    </tbody>

</table>

<script>

    let user =
    JSON.parse(
        localStorage.getItem("user")
    );

if(user==null){

    alert("请先登录");

    location.href="/login.html";
}

if(user){

    document.getElementById("loginUser")
    .innerHTML=

    "当前用户："
    +user.username+
    "（"
    +user.role+
    "）";
}

if(user.role==="管理员"){

    document.getElementById("menu").innerHTML=

    `
    <a href=" "
       class="btn btn-primary">

       发布订单

    </a >

    <button
    class="btn btn-success"
    onclick="loadOrders()">

    查看订单

    </button>

    <a href="user.html"
       class="btn btn-secondary">

       用户管理

    </a >
    `;

}else if(user.role==="用户"){

    document.getElementById("menu").innerHTML=

    `
    <a href="/publish.html"
       class="btn btn-primary">

       发布订单

    </a >

    <button
    class="btn btn-success"
    onclick="loadOrders()">

    查看订单

    </button>
    `;

}else{

    document.getElementById("menu").innerHTML=

    `
    <button
    class="btn btn-success"
    onclick="loadOrders()">

    查看订单

    </button>
    `;
}

    function loadDashboard(){

        fetch("/dashboard")
        .then(response=>response.json())
        .then(data=>{

            document.getElementById("dashboard")
            .innerHTML=

            "总订单数："+data.totalOrders+
            "<br><br>"+
            "已完成："+data.finishedOrders+
            "<br><br>"+
            "成交金额："+data.totalAmount;
        });
    }

    function loadOrders(){

        fetch("/translationOrder/list")
.then(response=>response.json())
.then(data=>{

    let html="";

    data.forEach(order=>{

        let statusHtml="";

        if(order.status==="待接单"){

            statusHtml=
            '<span class="badge bg-danger">待接单</span>';

        }else if(order.status==="翻译中"){

            statusHtml=
            '<span class="badge bg-warning">翻译中</span>';

        }else{

            statusHtml=
            '<span class="badge bg-success">已完成</span>';
        }

        let actionHtml="";

        if(order.status==="待接单"){

            actionHtml=
`
<button
onclick="accept(${order.id})"
class="btn btn-primary btn-sm">

接单

</button>
`;

if(user.role=="管理员"){

    actionHtml+=`
    <button
    onclick="deleteOrder(${order.id})"
    class="btn btn-danger btn-sm">

    删除

    </button>
    `;
}
        }else if(order.status==="翻译中"){

            actionHtml=
`
<button
onclick="finish(${order.id})"
class="btn btn-success btn-sm">

完成

</button>
`;

if(user.role=="管理员"){

    actionHtml+=`
    <button
    onclick="deleteOrder(${order.id})"
    class="btn btn-danger btn-sm">

    删除

    </button>
    `;
}

        }else{

            actionHtml=
`
<span class="text-success">
已完成
</span>
`;

if(user.role=="管理员"){

    actionHtml+=`
    <button
    onclick="deleteOrder(${order.id})"
    class="btn btn-danger btn-sm">

    删除

    </button>
    `;
}
        }

        html+=`

        <tr>

            <td>${order.id}</td>

            <td>${order.title}</td>

            <td>${order.sourceLanguage}</td>

            <td>${order.targetLanguage}</td>

            <td>${order.price}</td>

            <td>${order.createTime.replace("T"," ")}</td>

            <td>${statusHtml}</td>

            <td>${actionHtml}</td>

        </tr>

        `;
    });

    document.getElementById("result").innerHTML
    = html;

});
    }

    function accept(id){

        fetch("/translationOrder/accept/"+id)
        .then(()=>{

            alert("接单成功");

            loadOrders();
            loadDashboard();
        });
    }

    function finish(id){

        fetch("/translationOrder/finish/"+id)
        .then(()=>{

            alert("订单完成");

            loadOrders();
            loadDashboard();
        });
    }

    loadDashboard();

    loadOrders();

    function searchOrder(){

    let keyword =
        document.getElementById("keyword").value;

    fetch(
        "/translationOrder/search?keyword="
        +keyword
    )
    .then(response=>response.json())
    .then(data=>{

        let html="";

        data.forEach(order=>{

            html+=`
            <tr>

            <td>${order.id}</td>

            <td>${order.title}</td>

            <td>${order.sourceLanguage}</td>

            <td>${order.targetLanguage}</td>

            <td>${order.price}</td>

            <td>${order.status}</td>

            <td>

            <button
            onclick="accept(${order.id})"
            class="btn btn-primary btn-sm">

            接单

            </button>

            <button
            onclick="finish(${order.id})"
            class="btn btn-success btn-sm">

            完成

            </button>

            </td>

            </tr>
            `;
        });

        document.getElementById("result").innerHTML
        = html;
    });
}

    function deleteOrder(id){

    if(!confirm("确定删除订单吗？")){
        return;
    }

    fetch("/translationOrder/delete/"+id)
    .then(response=>response.text())
    .then(data=>{

        alert(data);

        loadOrders();

        loadDashboard();
    });
}


    function logout(){

    localStorage.removeItem("user");

    location.href="/login.html";
}

</script>

</body>
</html>
