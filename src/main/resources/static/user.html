<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="container mt-4">
<h2>用户管理</h2>
<hr>

<input id="username"
       class="form-control"
       placeholder="用户名">

<br>

<input id="password"
       class="form-control"
       placeholder="密码">

<br>

<select id="role"
        class="form-control">

    <option>用户</option>

    <option>译员</option>

    <option>管理员</option>

</select>

<br>

<button
        class="btn btn-primary"
        onclick="addUser()">

    新增用户

</button>

<hr>

返回首页
<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>用户名</th>
        <th>密码</th>
        <th>角色</th>
        <th>操作</th>
    </tr>
    </thead>
    <tbody id="result">
    </tbody>
</table>
<script>
    fetch("/user/list")
    .then(response=>response.json())
    .then(data=>{
        let html="";
        data.forEach(user=>{
            html+=`
            <tr>
            <td>${user.id}</td>
            <td>${user.username}</td>
            <td>${user.password}</td>
            <td>${user.role}</td>
            <td>

<button
onclick="deleteUser(${user.id})"
class="btn btn-danger btn-sm">

删除

</button>

</td>
            </tr>
            `;
        });
        document.getElementById("result").innerHTML=html;
    });

    function addUser(){

    let username =
        document.getElementById("username").value;

    let password =
        document.getElementById("password").value;

    let role =
        document.getElementById("role").value;

    fetch(
        "/user/add?username="
        +username
        +"&password="
        +password
        +"&role="
        +role
    )
    .then(()=>{

        alert("新增成功");

        location.reload();

    });
}

    function deleteUser(id){

    if(!confirm("确定删除吗？")){
        return;
    }

    fetch("/user/delete/"+id)
    .then(response=>response.text())
    .then(data=>{

        alert(data);

        location.reload();
    });
}
</script>
</body>
</html>
